# openclaw-tenant Nginx 反代配置
# 使用方法：
#   1. 将此文件复制到 /etc/nginx/sites-available/openclaw-tenant
#   2. 按实际情况修改 server_name（域名）和 SSL 证书路径
#   3. 创建软链接：ln -s /etc/nginx/sites-available/openclaw-tenant /etc/nginx/sites-enabled/
#   4. 验证配置：nginx -t
#   5. 重载：systemctl reload nginx
#
# 安全说明：
#   - 仅对外暴露 HTTPS，HTTP 强制跳转
#   - Bun 进程只监听 127.0.0.1，不对外暴露
#   - 建议配合 fail2ban 对 /api/auth 接口进行频率限制

server {
    listen 80;
    listen [::]:80;
    # ⚠️ 修改为你的实际域名
    server_name YOUR_DOMAIN;

    # HTTP 强制跳转 HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # ⚠️ 修改为你的实际域名
    server_name YOUR_DOMAIN;

    # ⚠️ 修改为你的 SSL 证书路径（推荐使用 certbot/Let's Encrypt）
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # SSL 安全设置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # 客户端上传大小限制（按需调整）
    client_max_body_size 10m;

    # WebSocket 反代（用于 Gateway 日志等实时推送）
    location /ws/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # 所有请求转发给 Bun（Hono 同时 serve API + 前端静态文件）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;

        # 对登录接口做频率限制（需在 nginx.conf http 块定义 limit_req_zone）
        # location /api/auth/login {
        #     limit_req zone=login_limit burst=5 nodelay;
        #     proxy_pass http://127.0.0.1:3000;
        # }
    }
}
